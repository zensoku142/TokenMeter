name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt -r requirements-build.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Build PyInstaller onedir
        run: python scripts/build_release.py --stage onedir

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Inno Setup installer
        run: python scripts/build_release.py --stage installer --require-installer

      - name: Smoke test onedir and installed application
        shell: pwsh
        run: |
          python scripts/build_release.py --stage smoke
          $setup = Resolve-Path "dist-installer/TokenMeter-Setup-v*-x64.exe"
          $installDir = Join-Path $env:RUNNER_TEMP "TokenMeter Smoke Install"
          $arguments = @(
            "/VERYSILENT",
            "/SUPPRESSMSGBOXES",
            "/NORESTART",
            "/NOICONS",
            "/DIR=`"$installDir`""
          )
          $install = Start-Process $setup -ArgumentList $arguments -Wait -PassThru
          if ($install.ExitCode -ne 0) { throw "Installer exited with $($install.ExitCode)" }
          New-Item -ItemType Directory -Force (Join-Path $installDir "data") | Out-Null
          Set-Content (Join-Path $installDir "data/preserve-marker.txt") "keep"
          $overwrite = Start-Process $setup -ArgumentList $arguments -Wait -PassThru
          if ($overwrite.ExitCode -ne 0) { throw "Overwrite install exited with $($overwrite.ExitCode)" }
          if (-not (Test-Path (Join-Path $installDir "data/preserve-marker.txt"))) {
            throw "Overwrite install removed user data"
          }
          $app = Start-Process (Join-Path $installDir "TokenMeter.exe") -PassThru
          Start-Sleep -Seconds 5
          if ($app.HasExited -and $app.ExitCode -ne 0) {
            throw "Installed TokenMeter exited with $($app.ExitCode)"
          }
          if (-not $app.HasExited) { Stop-Process -Id $app.Id -Force }

      - name: Generate SHA256SUMS
        run: python scripts/build_release.py --stage checksums --require-installer

      - name: Determine release channel
        id: channel
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -match "-") {
            "is_prerelease=true" >> $env:GITHUB_OUTPUT
            "make_latest=false" >> $env:GITHUB_OUTPUT
          } else {
            "is_prerelease=false" >> $env:GITHUB_OUTPUT
            "make_latest=true" >> $env:GITHUB_OUTPUT
          }

      - name: Resolve release notes
        id: notes
        shell: pwsh
        run: |
          $path = "release-notes/${{ github.ref_name }}.md"
          # Release 正文需要保持仓库里原有的人写风格；有对应文件时优先使用，
          # 避免 action 只上传附件却生成空白正文。
          if (Test-Path $path) {
            "has_body=true" >> $env:GITHUB_OUTPUT
            "body_path=$path" >> $env:GITHUB_OUTPUT
          } else {
            "has_body=false" >> $env:GITHUB_OUTPUT
          }

      - name: Publish GitHub Release
        if: steps.notes.outputs.has_body == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: TokenMeter ${{ github.ref_name }}
          draft: false
          prerelease: ${{ steps.channel.outputs.is_prerelease }}
          make_latest: ${{ steps.channel.outputs.make_latest }}
          body_path: ${{ steps.notes.outputs.body_path }}
          files: |
            dist-installer/TokenMeter-Setup-v*-x64.exe
            dist-installer/SHA256SUMS.txt

      - name: Publish GitHub Release Without Body
        if: steps.notes.outputs.has_body != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: TokenMeter ${{ github.ref_name }}
          draft: false
          prerelease: ${{ steps.channel.outputs.is_prerelease }}
          make_latest: ${{ steps.channel.outputs.make_latest }}
          files: |
            dist-installer/TokenMeter-Setup-v*-x64.exe
            dist-installer/SHA256SUMS.txt
