name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build release artifacts
        run: python scripts/build_release.py

      - name: Determine release channel
        id: channel
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -match "-") {
            "is_prerelease=true" >> $env:GITHUB_OUTPUT
            "make_latest=false" >> $env:GITHUB_OUTPUT
          } else {
            "is_prerelease=false" >> $env:GITHUB_OUTPUT
            "make_latest=true" >> $env:GITHUB_OUTPUT
          }

      - name: Resolve release notes
        id: notes
        shell: pwsh
        run: |
          $path = "release-notes/${{ github.ref_name }}.md"
          # Release 正文需要保持仓库里原有的人写风格；有对应文件时优先使用，
          # 避免 action 只上传附件却生成空白正文。
          if (Test-Path $path) {
            "has_body=true" >> $env:GITHUB_OUTPUT
            "body_path=$path" >> $env:GITHUB_OUTPUT
          } else {
            "has_body=false" >> $env:GITHUB_OUTPUT
          }

      - name: Publish GitHub Release
        if: steps.notes.outputs.has_body == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ steps.channel.outputs.is_prerelease }}
          make_latest: ${{ steps.channel.outputs.make_latest }}
          body_path: ${{ steps.notes.outputs.body_path }}
          files: |
            dist/TokenSpider-v*-windows-x64.exe
            dist/TokenSpiderUpdater-v*-windows-x64.exe
            dist/SHA256SUMS.txt

      - name: Publish GitHub Release Without Body
        if: steps.notes.outputs.has_body != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ steps.channel.outputs.is_prerelease }}
          make_latest: ${{ steps.channel.outputs.make_latest }}
          files: |
            dist/TokenSpider-v*-windows-x64.exe
            dist/TokenSpiderUpdater-v*-windows-x64.exe
            dist/SHA256SUMS.txt
